  scores: {}, methods: {}, tools: [], opsFormat: '', pcUsage: '', automations: [], notes: ''
};
try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = Object.assign(state, JSON.parse(s)); } catch(e) {}
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function setState(u) { Object.assign(state, u); saveState(); render(); }

function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function calcScore(id) {
  const s = state.scores[id];
  if (!s || !s.difficulty || !s.dislike || !s.frequency) return 0;
  const f = FREQUENCY_OPTIONS.find(x => x.value === s.frequency);
  return (s.difficulty + s.dislike) * (f ? f.score : 0);
}
function getRanking() {
  return CATEGORIES.map(c => ({ ...c, score: calcScore(c.id), data: state.scores[c.id] || {}, method: state.methods[c.id] || '' })).sort((a,b) => b.score - a.score);
}
function isStep2Valid() {
  return CATEGORIES.every(c => { const s = state.scores[c.id]; return s && s.difficulty && s.dislike && s.frequency; });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function nextStep() { setState({ step: state.step + 1 }); window.scrollTo(0, 0); }
function prevStep() { setState({ step: state.step - 1 }); window.scrollTo(0, 0); }
function updateBasic(f, v) { state.basicInfo[f] = v; saveState(); }
function updateScore(id, f, v) { if (!state.scores[id]) state.scores[id] = {}; state.scores[id][f] = v; saveState(); render(); }
function updateMethod(id, v) { state.methods[id] = v; saveState(); }
function toggleArr(name, id) { const a = state[name]; const i = a.indexOf(id); if (i >= 0) a.splice(i,1); else a.push(id); saveState(); render(); }
function setSingle(f, v) { setState({ [f]: v }); }
function updateNotes(v) { state.notes = v; saveState(); }

function copyPrompt() {
  const text = generatePrompt();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('プロンプトをコピーしました'), () => fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast('プロンプトをコピーしました'); } catch(e) { showToast('コピー失敗'); }
  document.body.removeChild(ta);
}
function resetAll() {
  if (!confirm('入力内容をすべてリセットして最初からやり直しますか？')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state = { step: 0, basicInfo: { salonName: SALON.name, ownerName: SALON.ownerName, openDate: '', yearsExperience: '' }, scores: {}, methods: {}, tools: [], opsFormat: '', pcUsage: '', automations: [], notes: '' };
  saveState(); render();
}

function generatePrompt() {
  const ranking = getRanking(); const top3 = ranking.slice(0, 3);
  const toolsList = state.tools.map(t => (CURRENT_TOOLS.find(x => x.id === t) || {}).label).filter(Boolean).join('、');
  const opsObj = OPS_FORMATS.find(o => o.id === state.opsFormat);
  const opsLabel = opsObj ? opsObj.label : '未選択';
  const opsDesc = opsObj ? opsObj.desc : '';
  const pcLabel = (PC_USAGE.find(p => p.id === state.pcUsage) || {}).label || '未選択';
  const autoList = state.automations.map(a => { const o = AUTOMATIONS.find(x => x.id === a); return o ? '・' + o.label + ' [' + o.tool + ']' : ''; }).filter(Boolean).join('\n');
  const medals = ['🥇','🥈','🥉'];
  const top3Text = top3.map((t, i) => {
    const fl = (FREQUENCY_OPTIONS.find(f => f.value === t.data.frequency) || {}).label || '';
    return medals[i] + ' 第' + (i+1) + '位: ' + t.name + ' (スコア: ' + t.score + ')\n   ・困り度: ' + '★'.repeat(t.data.difficulty) + ' (' + t.data.difficulty + '/5)\n   ・やりたくない度: ' + '★'.repeat(t.data.dislike) + ' (' + t.data.dislike + '/5)\n   ・頻度: ' + fl + '\n   ・現状: ' + (t.method || '(未記入)');
  }).join('\n\n');
  return 'はじめまして。広島市西区己斐中で美容室「' + (state.basicInfo.salonName || 'melis') + '」を1人で経営している' + (state.basicInfo.ownerName || '上田 昌樹') + 'と申します。\n' +
    (state.basicInfo.openDate ? '開業時期: ' + state.basicInfo.openDate + '\n' : '') +
    (state.basicInfo.yearsExperience ? '美容師歴: ' + state.basicInfo.yearsExperience + '\n' : '') +
    '営業時間: 9:30〜19:30 / 定休日: 月曜\n\n' +
    '日中はお客様の施術に専念したいので、事務作業はどうしても夜にまとめて行うことになります。\nそこで全業務を棚卸しして、AIで最も助けてほしい部分を整理してきました。\n\n' +
    '━━━━━━━━━━━━━━━━━━━━━━\n【業務棚卸し結果 - 優先度TOP3】\n━━━━━━━━━━━━━━━━━━━━━━\n\n' + top3Text + '\n\n' +
    '━━━━━━━━━━━━━━━━━━━━━━\n【現在使っているツール】\n' + (toolsList || '(未選択)') + '\n\n' +
    '【PC利用頻度】\n' + pcLabel + '\n\n' +
    '【希望する運用スタイル】\n' + opsLabel + '\n' + opsDesc + '\n\n' +
    (state.automations.length > 0 ? '【特に自動化したい作業】\n' + autoList + '\n\n' : '') +
    (state.notes ? '【その他・特記事項】\n' + state.notes + '\n\n' : '') +
    '━━━━━━━━━━━━━━━━━━━━━━\n\n' +
    '【お願いしたいこと】\nまず第1位の「' + (top3[0] ? top3[0].name : '') + '」に集中して、AI初心者でも実践できる改善プランを段階的に教えてください。\n\n' +
    '具体的には以下4点を整理してほしいです:\n1. 最初の1週間で取り組むべき具体的なアクション\n2. 1か月後に到達できる状態のイメージ\n3. 私の現在のツール環境(' + (toolsList || '未選択') + ')で無理なく始められる方法\n4. つまずきやすいポイントとその回避策\n\n' +
    '長文の詳細解説より、すぐ手を動かせるレベルの実践ガイドを最優先でお願いします。';
}

function getRecommendedAutos() {
  const top3CatIds = getRanking().slice(0, 3).map(r => r.id);
  return AUTOMATIONS.filter(a => top3CatIds.includes(a.relatedCat) || state.automations.includes(a.id))
    .map(a => Object.assign({}, a, { isInTop3: top3CatIds.includes(a.relatedCat), isSelected: state.automations.includes(a.id) }));
}

function tplProgress(cur, total) {
  let h = '<div class="progress">';
  for (let i = 0; i < total; i++) h += '<div class="progress-segment ' + (i < cur ? 'done' : '') + '"></div>';
  return h + '</div>';
}
function tplHeader() {
  return '<div class="header"><div class="header-script">melis</div><div class="header-en">Workflow Refinement</div></div>';
}

function tplWelcome() {
  return '<div class="card"><div class="welcome-header"><div class="welcome-script">melis</div><div class="welcome-meta">HAIR SALON<br>HIROSHIMA · KOI</div></div>' +
    '<div class="welcome-tag"><div class="welcome-tag-line"></div><div class="welcome-tag-text">AI Workflow Refinement</div></div>' +
    '<div class="welcome-title">上田 昌樹さん専用<br><span class="welcome-title-sub">— Workflow Hearing Session</span></div>' +
    '<p class="welcome-text">melisのご開業、本当におめでとうございます。</p>' +
    '<p class="welcome-text">日中はお客様への施術に集中するため、夜の事務作業がどうしても増えてしまいます。そこを<span class="welcome-emphasis">AI(Claude)に肩代わり</span>してもらうために、まずは「どこが一番大変か」を整理させてください。</p>' +
    '<p class="welcome-text-small">所要時間は約8〜12分。回答内容から自動でTOP3課題を算出し、Claudeにそのまま貼り付けて使える専用プロンプトを生成します。Claude in Chrome(発注自動化)・Claude in Excel等のおすすめ機能も提案します。</p>' +
    '<div class="stats"><div class="stat"><div class="stat-num">9</div><div class="stat-label">Categories</div></div><div class="stat"><div class="stat-num">3</div><div class="stat-label">Top Issues</div></div><div class="stat"><div class="stat-num">6</div><div class="stat-label">Auto Ideas</div></div><div class="stat"><div class="stat-num">1</div><div class="stat-label">AI Prompt</div></div></div>' +
    '<button class="cta-button" onclick="nextStep()">BEGIN SESSION →</button>' +
    '<p class="cta-foot">入力データはこのブラウザ内で完結します</p></div>' +
    '<p class="welcome-foot">for melis</p>';
}

function tplBasicInfo() {
  const b = state.basicInfo;
  return '<div class="card"><div class="step-label">STEP 01 / 04</div><div class="step-title">基本情報</div><div class="step-desc">名刺情報をプリセット済み。修正したい場合は上書きしてください。</div>' +
    '<div class="field"><label class="field-label">サロン名</label><input class="input" type="text" value="' + escapeHtml(b.salonName) + '" oninput="updateBasic(\'salonName\', this.value)"></div>' +
    '<div class="field"><label class="field-label">お名前</label><input class="input" type="text" value="' + escapeHtml(b.ownerName) + '" oninput="updateBasic(\'ownerName\', this.value)"></div>' +
    '<div class="field"><label class="field-label">開業時期</label><input class="input" type="text" placeholder="例: 2025年10月" value="' + escapeHtml(b.openDate) + '" oninput="updateBasic(\'openDate\', this.value)"></div>' +
    '<div class="field"><label class="field-label">美容師歴</label><input class="input" type="text" placeholder="例: 12年" value="' + escapeHtml(b.yearsExperience) + '" oninput="updateBasic(\'yearsExperience\', this.value)"></div>' +
    '<div class="info-box"><div class="info-box-row"><span class="info-box-key">所在地</span><span>' + SALON.address + '</span></div><div class="info-box-row"><span class="info-box-key">営業時間</span><span>' + SALON.hours + '</span></div><div class="info-box-row"><span class="info-box-key">定休日</span><span>' + SALON.closed + '</span></div></div>' +
    '<div class="nav"><div class="nav-row"><button class="btn-back" onclick="prevStep()">← BACK</button><button class="btn-primary" onclick="nextStep()">NEXT →</button></div></div></div>';
}

function tplCategoryCard(cat, idx) {
  const data = state.scores[cat.id] || {};
  const method = state.methods[cat.id] || '';
  const ic = data.difficulty && data.dislike && data.frequency;
  let h = '<div class="cat-card ' + (ic ? 'complete' : '') + '"><div class="cat-header"><div class="cat-icon">' + cat.icon + '</div><div class="cat-info"><div><span class="cat-num">#' + (idx+1).toString().padStart(2,'0') + '</span><span class="cat-name">' + cat.name + '</span>' + (ic ? '<span class="cat-check">✓</span>' : '') + '</div><div class="cat-desc">' + cat.desc + '</div></div></div>';
  h += tplScoreRow('困り度', '今どれくらい困っている？', data.difficulty, cat.id, 'difficulty');
  h += tplScoreRow('やりたくない度', '正直、やりたくない？', data.dislike, cat.id, 'dislike');
  h += '<div class="score-row"><div class="score-row-head"><span class="score-row-label">月間頻度</span><span class="score-row-sub">どれくらい発生？</span></div><div class="chip-row">';
  for (const o of FREQUENCY_OPTIONS) h += '<button class="chip ' + (data.frequency === o.value ? 'active' : '') + '" onclick="updateScore(\'' + cat.id + '\',\'frequency\',\'' + o.value + '\')">' + o.label + '</button>';
  h += '</div></div>';
  h += '<div class="score-row"><div class="score-row-head"><span class="score-row-label">現状の方法</span><span class="score-row-sub">任意・空欄OK</span></div><input class="input" style="font-size:12px;padding:8px 12px" type="text" placeholder="例: LINEで個別対応、紙ノートに記録、など" value="' + escapeHtml(method) + '" oninput="updateMethod(\'' + cat.id + '\', this.value)"></div></div>';
  return h;
}
function tplScoreRow(label, sub, val, cid, fld) {
  let h = '<div class="score-row"><div class="score-row-head"><span class="score-row-label">' + label + '</span><span class="score-row-sub">' + sub + '</span></div><div class="score-buttons">';
  for (let n = 1; n <= 5; n++) {
    let cls = ''; if (val === n) cls = 'active'; else if (val && n <= val) cls = 'partial';
    h += '<button class="score-btn ' + cls + '" onclick="updateScore(\'' + cid + '\',\'' + fld + '\',' + n + ')">' + n + '</button>';
  }
  return h + '</div><div class="score-row-foot"><span>少ない</span><span>多い</span></div></div>';
}

function tplStep2() {
  let h = '<div class="card"><div class="step-label">STEP 02 / 04</div><div class="step-title">業務分野ごとの困り度</div><div class="step-desc">9分野について「困り度・やりたくない度・月間頻度」をお答えください。</div><div class="tip-box">💡 直感でOK。深く考えすぎず3秒で答えてください。</div>';
  CATEGORIES.forEach((c, i) => { h += tplCategoryCard(c, i); });
  const v = isStep2Valid();
  h += '<div class="nav">' + (v ? '' : '<div class="nav-hint">⚠ 全カテゴリの3項目を入力してください</div>') + '<div class="nav-row"><button class="btn-back" onclick="prevStep()">← BACK</button><button class="btn-primary" ' + (v ? '' : 'disabled') + ' onclick="nextStep()">NEXT →</button></div></div></div>';
  return h;
}

function tplStep3() {
  const v = state.tools.length > 0 && state.pcUsage && state.opsFormat;
  let h = '<div class="card"><div class="step-label">STEP 03 / 04</div><div class="step-title">運用スタイル & 自動化候補</div><div class="step-desc">現在のツール環境とAIに任せたい運用スタイル、特に自動化したい作業を教えてください。</div>';
  h += '<div style="margin-bottom:32px"><label class="section-label">現在使っているツール</label><div class="field-sublabel">複数選択可</div><div class="option-grid">';
  for (const t of CURRENT_TOOLS) {
    const a = state.tools.includes(t.id);
    h += '<button class="option-btn ' + (a ? 'active' : '') + '" onclick="toggleArr(\'tools\',\'' + t.id + '\')"><div class="checkbox">' + (a ? '✓' : '') + '</div><span>' + t.label + '</span></button>';
  }
  h += '</div></div>';
  h += '<div style="margin-bottom:32px"><label class="section-label">PCの利用頻度</label><div class="option-grid">';
  for (const p of PC_USAGE) {
    const a = state.pcUsage === p.id;
    h += '<button class="option-btn ' + (a ? 'active' : '') + '" onclick="setSingle(\'pcUsage\',\'' + p.id + '\')"><span>' + p.label + '</span></button>';
  }
  h += '</div></div>';
  h += '<div style="margin-bottom:32px"><label class="section-label">希望する運用スタイル</label><div class="radio-stack">';
  for (const o of OPS_FORMATS) {
    const a = state.opsFormat === o.id;
    h += '<button class="radio-option ' + (a ? 'active' : '') + '" onclick="setSingle(\'opsFormat\',\'' + o.id + '\')"><div class="radio-circle"></div><div class="radio-content"><div class="radio-label">' + o.label + '</div><div class="radio-desc">' + o.desc + '</div></div></button>';
  }
  h += '</div></div>';
  h += '<div style="margin-bottom:32px"><label class="section-label">特に自動化したい作業</label><div class="field-sublabel">複数選択可・該当するものだけ</div><div class="radio-stack">';
  for (const a of AUTOMATIONS) {
    const ac = state.automations.includes(a.id);
    h += '<button class="auto-card ' + (ac ? 'active' : '') + '" onclick="toggleArr(\'automations\',\'' + a.id + '\')"><div class="checkbox">' + (ac ? '✓' : '') + '</div><div class="auto-icon">' + a.icon + '</div><div class="auto-content"><div class="auto-title-row"><span class="auto-label">' + a.label + '</span><span class="auto-tool">' + a.tool + '</span></div><div class="auto-desc">' + a.desc + '</div></div></button>';
  }
  h += '</div></div>';
  h += '<div style="margin-bottom:32px"><label class="section-label">その他・特記事項</label><div class="field-sublabel">任意</div><textarea class="textarea" rows="3" placeholder="例: 集客に伸び悩み中、店販を強化したい、特定の発注サイトを使っている、など" oninput="updateNotes(this.value)">' + escapeHtml(state.notes) + '</textarea></div>';
  h += '<div class="nav">' + (v ? '' : '<div class="nav-hint">⚠ 必須項目をすべて選択してください</div>') + '<div class="nav-row"><button class="btn-back" onclick="prevStep()">← BACK</button><button class="btn-primary" ' + (v ? '' : 'disabled') + ' onclick="nextStep()">結果を見る →</button></div></div></div>';
  return h;
}

function tplResult() {
  const ranking = getRanking(); const top3 = ranking.slice(0, 3); const top1 = top3[0]; const recos = getRecommendedAutos(); const prompt = generatePrompt(); const max = Math.max.apply(null, ranking.map(r => r.score).concat([1]));
  let h = '<div class="card" id="print-area"><div class="result-header"><div class="result-script">melis</div><div class="result-label">SESSION RESULT</div><div class="result-title">業務棚卸し結果</div><div class="result-sub">For ' + escapeHtml(state.basicInfo.ownerName || 'Mr. Ueda') + '</div></div>';
  h += '<div class="podium">';
  const medals = ['🏆','🥈','🥉'];
  top3.forEach((t, i) => { h += '<div class="podium-card rank' + (i+1) + '"><div class="podium-rank">第' + (i+1) + '位 ' + medals[i] + '</div><div class="podium-icon">' + t.icon + '</div><div class="podium-name">' + t.name + '</div><div class="podium-score">' + t.score + '<span class="podium-score-unit">pt</span></div></div>'; });
  h += '</div>';
  h += '<div class="result-section-h">全カテゴリ スコア比較</div><div class="chart">';
  const colors = ['#1c1917','#44403c','#57534e','#78716c','#a8a29e','#a8a29e','#a8a29e','#a8a29e','#a8a29e'];
  ranking.forEach((r, i) => { const w = (r.score / max) * 100; h += '<div class="bar-row"><div class="bar-name">' + r.name + '</div><div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:' + colors[i] + '"></div><div class="bar-value">' + r.score + '</div></div></div>'; });
  h += '</div>';
  if (top1 && top1.score > 0) {
    const fl = (FREQUENCY_OPTIONS.find(f => f.value === top1.data.frequency) || {}).label || '';
    h += '<div class="top1-detail"><div class="top1-label">PRIORITY #1 — DETAIL</div><div class="top1-name">' + top1.name + '</div><div class="top1-desc">' + top1.desc + '</div><div class="top1-grid"><div><div class="top1-stat-label">困り度</div><div class="top1-stat-val">' + '★'.repeat(top1.data.difficulty || 0) + '☆'.repeat(5-(top1.data.difficulty || 0)) + '</div></div><div><div class="top1-stat-label">やりたくない度</div><div class="top1-stat-val">' + '★'.repeat(top1.data.dislike || 0) + '☆'.repeat(5-(top1.data.dislike || 0)) + '</div></div><div><div class="top1-stat-label">頻度</div><div class="top1-stat-val" style="font-size:11px">' + fl + '</div></div></div></div>';
  }
  if (recos.length > 0) {
    h += '<div class="result-section-h">' + escapeHtml(state.basicInfo.ownerName || '上田さん') + 'へのおすすめ自動化</div><div class="field-sublabel">TOP3課題と希望から、特に効果が見込める自動化を抽出しました</div><div class="reco-list">';
    for (const r of recos) {
      h += '<div class="reco-card"><div class="reco-icon">' + r.icon + '</div><div class="reco-content"><div class="reco-titles"><span class="reco-name">' + r.label + '</span><span class="tag tag-tool">' + r.tool + '</span>' + (r.isInTop3 ? '<span class="tag tag-top3">TOP3関連</span>' : '') + (r.isSelected ? '<span class="tag tag-selected">ご希望</span>' : '') + '</div><div class="reco-desc">' + r.desc + '</div></div></div>';
    }
    h += '</div>';
  }
  h += '<div class="result-section-h">Claude用プロンプト ✨</div><div class="field-sublabel">下記をコピーしてClaude(claude.ai)に貼り付けると、TOP1課題に対する1週間アクションプランが返ってきます。</div><div class="prompt-box">' + escapeHtml(prompt) + '</div>';
  h += '<div class="actions no-print"><button class="btn-action primary" onclick="copyPrompt()">📋 プロンプトをコピー</button><button class="btn-action secondary" onclick="window.print()">⬇ PDFとして保存</button><button class="btn-action tertiary" onclick="resetAll()">↻ 最初からやり直す</button></div>';
  h += '<div class="result-footer"><div class="result-footer-script">melis</div><div class="result-footer-en">— Crafted with Claude, for your daily flow —</div></div></div>';
  return h;
}

function render() {
  const app = document.getElementById('app');
  let content = '';
  if (state.step === 0) content = tplWelcome();
  else {
    content = tplHeader() + tplProgress(state.step, 4);
    if (state.step === 1) content += tplBasicInfo();
    else if (state.step === 2) content += tplStep2();
    else if (state.step === 3) content += tplStep3();
    else if (state.step === 4) content += tplResult();
  }
  app.innerHTML = content;
}
render();
</script>
</body>
</html>
